suite_id = "core_supported"
description = "Positive conformance coverage for currently supported SQL statements."

[[cases]]
id = "ddl_create_table"
category = "ddl.create_table"
sql = "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))"

[cases.expect]
kind = "affected_rows"
count = 0

[[cases]]
id = "dml_insert"
category = "dml.insert"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))"
]
sql = "INSERT INTO users (id, email, active) VALUES (1, 'a@x.com', true)"

[cases.expect]
kind = "affected_rows"
count = 1

[[cases]]
id = "query_select_projection_order_limit"
category = "query.select"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))",
  "INSERT INTO users (id, email, active) VALUES (1, 'a@x.com', true)",
  "INSERT INTO users (id, email, active) VALUES (2, 'b@x.com', true)"
]
sql = "SELECT id, email FROM users WHERE active = true ORDER BY id DESC LIMIT 1"

[cases.expect]
kind = "query"
columns = ["id", "email"]
rows = [["2", "b@x.com"]]

[[cases]]
id = "dml_update"
category = "dml.update"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))",
  "INSERT INTO users (id, email, active) VALUES (1, 'a@x.com', true)"
]
sql = "UPDATE users SET email = 'updated@x.com' WHERE id = 1"

[cases.expect]
kind = "affected_rows"
count = 1

[[cases]]
id = "dml_delete"
category = "dml.delete"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))",
  "INSERT INTO users (id, email, active) VALUES (1, 'a@x.com', true)"
]
sql = "DELETE FROM users WHERE id = 1"

[cases.expect]
kind = "affected_rows"
count = 1

[[cases]]
id = "ddl_drop_table"
category = "ddl.drop_table"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, active BOOLEAN DEFAULT true, PRIMARY KEY (id))"
]
sql = "DROP TABLE users"

[cases.expect]
kind = "affected_rows"
count = 0

[[cases]]
id = "txn_begin"
category = "txn.begin"
setup_sql = [
  "CREATE TABLE accounts (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))"
]
sql = "BEGIN ISOLATION LEVEL SNAPSHOT"

[cases.expect]
kind = "transaction_state"
state = "begun"

[[cases]]
id = "txn_commit"
category = "txn.commit"
setup_sql = [
  "CREATE TABLE accounts (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))",
  "BEGIN ISOLATION LEVEL SNAPSHOT",
  "INSERT INTO accounts (id, email) VALUES (1, 'pending@x.com')"
]
sql = "COMMIT"

[cases.expect]
kind = "transaction_state"
state = "committed"

[[cases]]
id = "txn_rollback"
category = "txn.rollback"
setup_sql = [
  "CREATE TABLE accounts (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))",
  "BEGIN ISOLATION LEVEL SNAPSHOT",
  "INSERT INTO accounts (id, email) VALUES (2, 'rollback@x.com')"
]
sql = "ROLLBACK"

[cases.expect]
kind = "transaction_state"
state = "rolled_back"
