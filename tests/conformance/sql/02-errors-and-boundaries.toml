suite_id = "errors_and_boundaries"
description = "Negative conformance coverage for unsupported syntax and enforced SQL validation rules."

[[cases]]
id = "error_invalid_where_type"
category = "errors.invalid_where_type"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))"
]
sql = "SELECT id FROM users WHERE id + 1"

[cases.expect]
kind = "error_contains"
message = "WHERE clause must evaluate to BOOLEAN"

[[cases]]
id = "error_unsupported_join_syntax"
category = "errors.unsupported_join"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))",
  "CREATE TABLE accounts (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))"
]
sql = "SELECT users.id FROM users JOIN accounts ON users.id = accounts.id"

[cases.expect]
kind = "error_contains"
message = "expected a SQL statement"

[[cases]]
id = "error_ddl_in_explicit_transaction"
category = "errors.ddl_in_explicit_txn"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))",
  "BEGIN ISOLATION LEVEL SNAPSHOT"
]
sql = "CREATE TABLE audit (id BIGINT NOT NULL, PRIMARY KEY (id))"

[cases.expect]
kind = "error_contains"
message = "DDL in explicit transaction is not supported yet"

[[cases]]
id = "error_unknown_table"
category = "errors.unknown_table"
sql = "SELECT id FROM missing_users"

[cases.expect]
kind = "error_contains"
message = "table 'missing_users' not found"

[[cases]]
id = "error_duplicate_insert_column"
category = "errors.duplicate_column"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))"
]
sql = "INSERT INTO users (id, id) VALUES (1, 2)"

[cases.expect]
kind = "error_contains"
message = "duplicated in statement"

[[cases]]
id = "error_non_nullable_null"
category = "errors.non_nullable_null"
setup_sql = [
  "CREATE TABLE users (id BIGINT NOT NULL, email TEXT NOT NULL, PRIMARY KEY (id))"
]
sql = "INSERT INTO users (id, email) VALUES (1, NULL)"

[cases.expect]
kind = "error_contains"
message = "NULL is not allowed"
